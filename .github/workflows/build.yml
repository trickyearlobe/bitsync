name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: build (${{ matrix.os }}/${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        os: [linux, darwin]
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Resolve version
        id: version
        run: |
          version=$(git describe --tags --always --dirty)
          commit=$(git rev-parse --short HEAD)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "commit=$commit"   >> "$GITHUB_OUTPUT"

      - name: Build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p bin
          go build \
            -trimpath \
            -ldflags "-s -w -X main.version=${{ steps.version.outputs.version }} -X main.commit=${{ steps.version.outputs.commit }}" \
            -o bin/bitsync-${{ matrix.os }}-${{ matrix.arch }} .

      - uses: actions/upload-artifact@v4
        with:
          name: bitsync-${{ steps.version.outputs.version }}-${{ matrix.os }}-${{ matrix.arch }}
          path: bin/bitsync-${{ matrix.os }}-${{ matrix.arch }}
          if-no-files-found: error

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Vet
        run: go vet ./...
      - name: Build (host arch only)
        run: go build ./...
